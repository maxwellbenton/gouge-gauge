name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  # Lets you trigger a redeploy from the Actions tab without an empty commit.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; a new push cancels an in-flight one rather than
# queuing behind it, since only the latest commit's build is worth serving.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Build (GitHub Pages base path)
        run: npm run build
        env:
          # GitHub Pages serves a project site (this repo isn't a
          # <user>.github.io root repo) from /<repo-name>/, not the domain
          # root — vite.config.ts reads this to prefix every asset
          # reference, the PWA manifest, and the router's basename to
          # match. See vite.config.ts's comment on `base` for the full
          # explanation.
          BASE_PATH: /${{ github.event.repository.name }}/

      - name: SPA fallback for direct navigation on GitHub Pages
        # GitHub Pages is a static host with no server-side rewrites, so a
        # hard refresh (or a shared link) on a client-side route like
        # /compare 404s — there's no compare/index.html file. Copying the
        # app shell to 404.html is the standard workaround: GitHub Pages
        # serves 404.html for any unmatched path, and since it's the same
        # app shell, React Router then renders the right route client-side.
        run: cp dist/index.html dist/404.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
